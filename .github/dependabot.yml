version: 2
updates:
- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "10:00"
    timezone: "America/New_York"
  open-pull-requests-limit: 1
  groups:
    all-dependencies:
      patterns:
      - "*"
      update-types:
      - "minor"
      - "patch"
      - "major"
